    - region "Todo lo que necesitás saber" [ref=e391]:
      - generic [ref=e392]:
        - generic [ref=e393]:
          - paragraph [ref=e394]: Preguntas frecuentes
          - heading "Todo lo que necesitás saber" [level=2] [ref=e395]
        - generic [ref=e396]:
          - generic [ref=e397]:
            - term [ref=e398]:
              - button "¿Cómo se genera el avatar de mi mascota?" [ref=e399] [cursor=pointer]: ¿Cómo se genera el avatar de mi mascota?
            - definition:
              - paragraph [ref=e401]: Subís entre 3 y 10 fotos de tu mascota desde distintos ángulos y con buena iluminación. Nuestro sistema analiza las fotos para capturar sus rasgos únicos — color de pelaje, forma de la cara, postura característica — y genera un avatar animado en minutos. No necesitás ningún conocimiento técnico, todo el proceso es guiado paso a paso.
          - generic [ref=e402]:
            - term [ref=e403]:
              - button "¿Qué pasa con el memorial si cancelo mi suscripción?" [ref=e404] [cursor=pointer]: ¿Qué pasa con el memorial si cancelo mi suscripción?
            - definition:
              - paragraph [ref=e406]: El perfil conmemorativo básico permanece activo siempre, aunque dejes de pagar. Las funciones premium (avatar animado, galería extendida, música) quedan pausadas, pero todo el contenido y las fotos se conservan intactos. Cuando quieras reactivar, el memorial sigue exactamente donde lo dejaste.
          - generic [ref=e407]:
            - term [ref=e408]:
              - button "¿Pueden acceder otras personas al memorial?" [ref=e409] [cursor=pointer]: ¿Pueden acceder otras personas al memorial?
            - definition:
              - paragraph [ref=e411]: Vos elegís. Podés configurarlo como público (visible para cualquier persona con el link), privado (solo vos), o compartido (solo las personas que vos invitás con un código). Podés cambiar esta configuración en cualquier momento desde tu panel.
          - generic [ref=e412]:
            - term [ref=e413]:
              - button "¿Qué fotos necesito subir para el avatar?" [ref=e414] [cursor=pointer]: ¿Qué fotos necesito subir para el avatar?
            - definition:
              - paragraph [ref=e416]: Con 3 fotos podés empezar — idealmente una de frente, una de perfil y una de cuerpo entero. Fotos con luz natural funcionan mucho mejor que con flash. Mientras más fotos subás, más fiel será el avatar. Podés usar fotos del celular sin ningún problema, no hace falta equipo especial.
          - generic [ref=e417]:
            - term [ref=e418]:
              - button "¿Es seguro subir fotos personales?" [ref=e419] [cursor=pointer]: ¿Es seguro subir fotos personales?
            - definition:
              - paragraph [ref=e421]: Absolutamente. Las fotos se almacenan con cifrado en servidores seguros y nunca se comparten con terceros ni se usan para entrenar modelos de IA de otros. Solo vos (y las personas que autorices) pueden verlas. Podés eliminarlas en cualquier momento desde tu panel.
          - generic [ref=e422]:
            - term [ref=e423]:
              - button "¿Puedo crear un memorial para más de una mascota?" [ref=e424] [cursor=pointer]: ¿Puedo crear un memorial para más de una mascota?
            - definition:
              - paragraph [ref=e426]: Sí, podés crear tantos memoriales como necesites desde la misma cuenta. Cada mascota tiene su propio espacio, perfil y avatar. Con el plan Memorial podés vincularlos en el árbol familiar de mascotas para mostrar todas sus historias juntas.
